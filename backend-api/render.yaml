services:
  - type: web
    name: demandpilot-backend
    rootDir: backend-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: demandpilot-db
          property: connectionString
      - key: ML_SERVICE_URL
        value: https://demandpilot-ml.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
